; Lake Garda Rentals — reference values for bulk admin gallery uploads.
;
; post_max_size must be larger than the total size of one multipart request
; (e.g. 5–7 high‑res JPEGs can be 75–150MB). upload_max_filesize is per file.
;
; Local dev: use Composer so PHP picks these up without editing system php.ini:
;   composer run serve
;
; Manual:
;   php -d post_max_size=256M -d upload_max_filesize=64M -d memory_limit=512M artisan serve
;
; Production — all three must allow your largest request (nginx runs first):
;
; 1) Nginx (413 "Request Entity Too Large" if this is too small):
;      client_max_body_size 32M;
;    Put it in `server { ... }` or `http { ... }` for the site, then:
;      sudo nginx -t && sudo systemctl reload nginx
;    Use at least ~25M if ADMIN_IMAGE_MAX_KB=20480 (20MB files); higher for multi‑file posts.
;
; 2) PHP-FPM (php.ini or pool.d/www.conf):
;      upload_max_filesize = 64M
;      post_max_size = 256M
;
; 3) Laravel validation: config `ADMIN_IMAGE_MAX_KB` (default 20480 = 20MB per file).

post_max_size = 256M
upload_max_filesize = 64M
memory_limit = 512M
