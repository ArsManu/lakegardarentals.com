; Lake Garda Rentals — reference values for bulk admin gallery uploads.
;
; post_max_size must be larger than the total size of one multipart request
; (e.g. 5–7 high‑res JPEGs can be 75–150MB). upload_max_filesize is per file.
;
; Local dev: use Composer so PHP picks these up without editing system php.ini:
;   composer run serve
;
; Manual:
;   php -d post_max_size=256M -d upload_max_filesize=64M -d memory_limit=512M artisan serve
;
; Production: set the same in php-fpm pool / php.ini, and nginx client_max_body_size.

post_max_size = 256M
upload_max_filesize = 64M
memory_limit = 512M
